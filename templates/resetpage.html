{% extends "base.html" %} {% block start %}
<div class="min-h-screen flex items-center justify-center">
  <div class="max-w-md w-full bg-white shadow-md rounded-lg p-6">
    <!-- Reset Password Header -->
    <h2 class="text-2xl font-bold text-center text-gray-800">
      Reset Your Password
    </h2>
    <p class="text-gray-600 mt-2 text-center">Enter your new password below.</p>

    <!-- Display Error Messages -->
    {% if messages %}
    <div class="mt-4">
      {% for message in messages %}
      <div
        id="message"
        class="text-sm mt-2 {% if message.tags == 'success' %}text-green-600{% elif message.tags == 'error' %}text-red-600{% else %}text-gray-600{% endif %}"
      >
        {{ message }}
      </div>
      {% endfor %}
    </div>
    {% endif %}

    <!-- Reset Password Form -->
    <form method="post" class="mt-6">
      {% csrf_token %}
      <div class="space-y-4">
        <div>
          <label
            for="new_password1"
            class="block text-sm font-medium text-gray-700"
          >
            New Password
          </label>
          <div class="relative">
            <input
              type="password"
              name="new_password1"
              id="new_password1"
              required
              class="mt-1 block w-full border-gray-300 rounded-lg shadow-sm focus:ring-blue-500 focus:border-blue-500"
            />
            <img
              src="/static/images/openeye.png"
              alt="Toggle Password Visibility"
              class="absolute top-1/2 right-3 transform -translate-y-1/2 cursor-pointer"
              onclick="togglePasswordVisibility('new_password1', this)"
            />
          </div>
        </div>
        <div>
          <label
            for="new_password2"
            class="block text-sm font-medium text-gray-700"
          >
            Confirm New Password
          </label>
          <div class="relative">
            <input
              type="password"
              name="new_password2"
              id="new_password2"
              required
              class="mt-1 block w-full border-gray-300 rounded-lg shadow-sm focus:ring-blue-500 focus:border-blue-500"
            />
            <img
              src="/static/images/openeye.png"
              alt="Toggle Password Visibility"
              class="absolute top-1/2 right-3 transform -translate-y-1/2 cursor-pointer"
              onclick="togglePasswordVisibility('new_password2', this)"
            />
          </div>
        </div>
      </div>
      <button
        type="submit"
        class="w-full mt-4 bg-blue-500 text-white py-2 px-4 rounded-lg hover:bg-blue-600"
      >
        Submit
      </button>
    </form>

    <!-- Back to Login -->
    <div class="mt-6 text-center">
      <p class="text-gray-600">
        Remember your password?
        <a href="{% url 'login' %}" class="text-blue-500 hover:underline">
          Log in
        </a>
      </p>
    </div>
  </div>
</div>
<script src="/static/js/resetpass.js"></script>
{% endblock %}
