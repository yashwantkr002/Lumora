<form
    method="get"
    action="{% url 'search' %}"
    class="w-full"
>

    <div
        class="relative"
    >

        <!-- Search Icon -->

        <i
            class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"
        ></i>

        <!-- Input -->

        <input
            type="search"
            name="q"
            value="{{ request.GET.q }}"
            placeholder="Search users, posts, hashtags..."
            autocomplete="off"
            class="w-full rounded-2xl border border-slate-300 bg-white py-3 pl-12 pr-12 shadow-sm transition-all focus:border-primary focus:outline-none focus:ring-2 focus:ring-primary/20 dark:border-slate-700 dark:bg-slate-900"
        >

        <!-- Clear -->

        {% if request.GET.q %}

            <a
                href="{% url 'search' %}"
                class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-red-500"
            >

                <i
                    class="fa-solid fa-xmark"
                ></i>

            </a>

        {% endif %}

    </div>

</form>
