<form
    method="post"
    action="{% url 'comment:create' post.id %}"
    class="space-y-4"
>

    {% csrf_token %}

    {{ form.content }}

    <button
        type="submit"
        class="rounded-xl bg-primary px-5 py-2 font-medium text-white transition hover:opacity-90"
    >

        Comment

    </button>

</form>
