<div
    class="flex gap-4 rounded-2xl border border-slate-200 bg-white p-5 shadow-sm dark:border-slate-800 dark:bg-slate-900"
>

    <!-- Avatar -->

    <a
        href="{% url 'profile' comment.author.username %}"
    >

        <img
            src="{{ comment.author.profile.avatar.url }}"
            alt="{{ comment.author.username }}"
            class="h-12 w-12 rounded-full object-cover"
        >

    </a>

    <!-- Content -->

    <div class="flex-1">

        <div
            class="flex items-center justify-between"
        >

            <div>

                <a
                    href="{% url 'profile' comment.author.username %}"
                    class="font-semibold hover:text-primary"
                >

                    {{ comment.author.get_full_name|default:comment.author.username }}

                </a>

                <span
                    class="ml-2 text-sm text-slate-500"
                >

                    {{ comment.created_at|timesince }} ago

                </span>

            </div>

            {% if request.user == comment.author %}

                <div
                    class="flex items-center gap-2"
                >

                    <a
                        href="{% url 'edit_comment' comment.id %}"
                        class="text-blue-500 hover:text-blue-700"
                    >

                        <i class="fa-solid fa-pen"></i>

                    </a>

                    <a
                        href="{% url 'delete_comment' comment.id %}"
                        class="text-red-500 hover:text-red-700"
                    >

                        <i class="fa-solid fa-trash"></i>

                    </a>

                </div>

            {% endif %}

        </div>

        <p
            class="mt-3 whitespace-pre-line text-slate-700 dark:text-slate-300"
        >

            {{ comment.content }}

        </p>

    </div>

</div>
