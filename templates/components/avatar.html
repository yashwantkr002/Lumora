{% load static %}

{% if user.profile.avatar %}

    <img
        src="{{ user.profile.avatar.url }}"
        alt="{{ user.username }}"
        class="{{ class|default:'h-10 w-10 rounded-full object-cover' }}"
        loading="lazy"
    >

{% else %}

    <img
        src="{% static 'images/default-avatar.png' %}"
        alt="Default Avatar"
        class="{{ class|default:'h-10 w-10 rounded-full object-cover' }}"
        loading="lazy"
    >

{% endif %}
