<a
    href="{% url 'notification_detail' notification.id %}"
    class="block rounded-2xl border border-slate-200 bg-white p-5 shadow-sm transition-all duration-300 hover:-translate-y-1 hover:shadow-lg dark:border-slate-800 dark:bg-slate-900"
>

    <div class="flex items-start gap-4">

        <!-- Sender Avatar -->

        <img
            src="{{ notification.sender.profile.avatar.url }}"
            alt="{{ notification.sender.username }}"
            class="h-12 w-12 rounded-full object-cover"
        >

        <!-- Content -->

        <div class="flex-1">

            <div
                class="flex items-center justify-between"
            >

                <h3
                    class="font-semibold"
                >

                    {{ notification.sender.get_full_name|default:notification.sender.username }}

                </h3>

                <span
                    class="text-xs text-slate-500"
                >

                    {{ notification.created_at|timesince }} ago

                </span>

            </div>

            <p
                class="mt-2 text-slate-600 dark:text-slate-300"
            >

                {{ notification.message }}

            </p>

            <div
                class="mt-4 flex items-center justify-between"
            >

                <span
                    class="rounded-full bg-slate-100 px-3 py-1 text-xs dark:bg-slate-800"
                >

                    {{ notification.notification_type }}

                </span>

                {% if not notification.is_read %}

                    <span
                        class="h-3 w-3 rounded-full bg-blue-500"
                    ></span>

                {% endif %}

            </div>

        </div>

    </div>

</a>
