{% extends "base.html" %}

{% block start %}
<div class="min-h-screen bg-gray-100 flex justify-center py-8">
  <div class="relative bg-white shadow-md rounded-lg p-6 w-full max-w-md">
    <h2 class="text-2xl font-bold text-gray-800 mb-4">Edit Profile</h2>
    <form method="post" enctype="multipart/form-data" class="space-y-4">
      {% csrf_token %}

      <!-- Profile Picture -->
      <div class="relative  w-full flex items-center justify-center space-x-4">
        <div class=" relative">
          <img
          id="profile-picture-preview"
          
          src="{% if user.profile_picture %}{{ user.profile_picture.url }}{% else %}/static/default-profile.png{% endif %}"
          alt="{{ user.username }}"
          class="h-24 w-24 rounded-full border-4 border-blue-500"
        />
        <!-- Pen Icon -->
        <button
          type="button"
          class="absolute bottom-0 right-2 bg-blue-500 text-white p-2 rounded-full shadow-md hover:bg-blue-600"
          onclick="document.getElementById('profile-picture-input').click()"
        >
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="h-5 w-5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M16.862 3.487a2.25 2.25 0 113.182 3.182L7.06 19.654a4.5 4.5 0 01-1.697 1.101l-3.068 1.021a.375.375 0 01-.482-.482l1.02-3.068a4.5 4.5 0 011.102-1.697L16.862 3.487z" />
            <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 7.5l6 6" />
          </svg>
        </button>
        </div>
        <!-- Hidden File Input -->
        <input
          type="file"
          id="profile-picture-input"
          name="profile_picture"
          class="hidden"
        />
      </div>

      <!-- Username -->
      <div>
        <label for="username" class="block text-gray-600 font-semibold">Username</label>
        <input
          type="text"
          id="username"
          name="username"
          disabled
          value="{{ user.username }}"
          class="w-full border-gray-300 rounded-lg shadow-sm focus:ring-blue-500 focus:border-blue-500 px-4 py-2"
          required
        />
      </div>

      <!-- Email -->
      <div>
        <label for="email" class="block text-gray-600 font-semibold">Email</label>
        <input
          type="email"
          id="email"
          name="email"
          disabled
          value="{{ user.email }}"
          class="w-full border-gray-300 rounded-lg shadow-sm focus:ring-blue-500 focus:border-blue-500 px-4 py-2"
          required
        />
      </div>
      <!-- First Name and Last Name -->
      <div class="flex space-x-4">
        <div>
          <label for="firstname" class="block text-gray-600 font-semibold">First Name</label>
          <input
            type="text"
            id="firstname"
            name="firstname"
            value="{{user.first_name}}"
            class="w-full border-gray-300 rounded-lg shadow-sm focus:ring-blue-500 focus:border-blue-500 px-4 py-2"
            required
          />
        </div>
        <div>
          <label for="lastname" class="block text-gray-600 font-semibold">Last Name</label>
          <input
            type="text"
            id="lastname"
            name="lastname"
            value="{{ user.last_name }}"
            class="w-full border-gray-300 rounded-lg shadow-sm focus:ring-blue-500 focus:border-blue-500 px-4 py-2"
            required
          />

        </div>
      </div>


      <!-- Bio -->
      <div>
        <label for="bio" class="block text-gray-600 font-semibold">Bio</label>
        <textarea
          id="bio"
          name="bio"
          rows="3"
          class="w-full border-gray-300 rounded-lg shadow-sm focus:ring-blue-500 focus:border-blue-500 px-4 py-2"
        >{{ user.bio }}</textarea>
      </div>

      <!-- Submit Button -->
      <div class="flex justify-center">
        <div class="flex justify-end space-x-4">
          <!-- Cancel Button -->
          <button
          type="submit"
            class="bg-red-500  text-white font-semibold px-6 py-2 rounded-lg shadow hover:bg-red-600"
          >
            <a 
            href="{% url 'profile' user.username %}" 
          >
            Cancel
          </a>
          </button>
        
          <!-- Submit Button -->
          <button
            type="submit"
            class="bg-blue-500 text-white font-semibold px-6 py-2 rounded-lg shadow hover:bg-blue-600"
          >
            Save Changes
          </button>
        </div>
        
      </div>
    </form>
  </div>
</div>

<script src="/static/js/editprofile.js">
</script>
{% endblock %}
