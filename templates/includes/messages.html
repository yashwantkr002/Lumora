{% if messages %}

<div
    id="messages-container"
    class="mb-6 space-y-3"
>

    {% for message in messages %}

        <div
            class="
                flex items-start justify-between rounded-xl border px-4 py-3 shadow-sm transition-all duration-300

                {% if message.tags == 'success' %}
                    border-green-200 bg-green-50 text-green-800 dark:border-green-700 dark:bg-green-900/20 dark:text-green-300

                {% elif message.tags == 'error' %}
                    border-red-200 bg-red-50 text-red-800 dark:border-red-700 dark:bg-red-900/20 dark:text-red-300

                {% elif message.tags == 'warning' %}
                    border-yellow-200 bg-yellow-50 text-yellow-800 dark:border-yellow-700 dark:bg-yellow-900/20 dark:text-yellow-300

                {% else %}
                    border-blue-200 bg-blue-50 text-blue-800 dark:border-blue-700 dark:bg-blue-900/20 dark:text-blue-300
                {% endif %}
            "
        >

            <div class="flex items-center gap-3">

                {% if message.tags == "success" %}

                    <i class="fa-solid fa-circle-check text-lg"></i>

                {% elif message.tags == "error" %}

                    <i class="fa-solid fa-circle-xmark text-lg"></i>

                {% elif message.tags == "warning" %}

                    <i class="fa-solid fa-triangle-exclamation text-lg"></i>

                {% else %}

                    <i class="fa-solid fa-circle-info text-lg"></i>

                {% endif %}

                <span>

                    {{ message }}

                </span>

            </div>

            <button
                type="button"
                onclick="this.parentElement.remove()"
                class="ml-4 text-lg opacity-70 transition hover:opacity-100"
            >

                <i class="fa-solid fa-xmark"></i>

            </button>

        </div>

    {% endfor %}

</div>

<script>

    setTimeout(() => {

        document
            .querySelectorAll(
                "#messages-container > div"
            )
            .forEach((message) => {

                message.remove();

            });

    }, 5000);

</script>

{% endif %}
