{% load static %}
<div
    class="sticky top-24 space-y-6"
>

    <!-- Profile Card -->

    <div
        class="rounded-2xl border border-slate-200 bg-white p-6 shadow-sm dark:border-slate-800 dark:bg-slate-900"
    >

        <div class="flex items-center gap-4">

            <img
                {% if request.user.profile.avatar %}
                    src="{{ request.user.profile.avatar.url }}"
                {% else %}
                    src="{% static 'images/default_avatar.png' %}"
                {% endif %}
                alt="{{ request.user.username }}"
                class="h-14 w-14 rounded-full border object-cover"
            >

            <div>

                <h3
                    class="font-semibold"
                >
                    {{ request.user.get_full_name|default:request.user.username }}
                </h3>

                <p
                    class="text-sm text-slate-500"
                >
                    @{{ request.user.username }}
                </p>

            </div>

        </div>

    </div>

    <!-- Navigation -->

    <div
        class="rounded-2xl border border-slate-200 bg-white p-4 shadow-sm dark:border-slate-800 dark:bg-slate-900"
    >

        <nav
            class="space-y-2"
        >

            <a
                href="{% url 'post:feed' %}"
                class="flex items-center gap-3 rounded-xl px-4 py-3 hover:bg-slate-100 dark:hover:bg-slate-800"
            >
                <i class="fa-solid fa-house w-5"></i>
                <span>Home</span>
            </a>

            <a
                href="{% url 'profile' request.user.username %}"
                class="flex items-center gap-3 rounded-xl px-4 py-3 hover:bg-slate-100 dark:hover:bg-slate-800"
            >
                <i class="fa-solid fa-user w-5"></i>
                <span>Profile</span>
            </a>

            <a
                href="{% url 'search' %}"
                class="flex items-center gap-3 rounded-xl px-4 py-3 hover:bg-slate-100 dark:hover:bg-slate-800"
            >
                <i class="fa-solid fa-compass w-5"></i>
                <span>Explore</span>
            </a>

            <a
                href="{% url 'post:reels' %}"
                class="flex items-center gap-3 rounded-xl px-4 py-3 hover:bg-slate-100 dark:hover:bg-slate-800"
            >
                <i class="fa-solid fa-film w-5"></i>
                <span>Reels</span>
            </a>

            <a
                href="{% url 'story:feed_story' %}"
                class="flex items-center gap-3 rounded-xl px-4 py-3 hover:bg-slate-100 dark:hover:bg-slate-800"
            >
                <i class="fa-solid fa-camera w-5"></i>
                <span>Stories</span>
            </a>

            <a
                href="{% url 'notification:list' %}"
                class="flex items-center gap-3 rounded-xl px-4 py-3 hover:bg-slate-100 dark:hover:bg-slate-800"
            >
                <i class="fa-solid fa-bell w-5"></i>
                <span>Notifications</span>
            </a>

            <a
                {% comment %} href="{% url 'conversations' %}" {% endcomment %}
                class="flex items-center gap-3 rounded-xl px-4 py-3 hover:bg-slate-100 dark:hover:bg-slate-800"
            >
                <i class="fa-solid fa-comments w-5"></i>
                <span>Messages</span>
            </a>

            <a
                {% comment %} href="{% url 'edit_profile' request.user.username %}" {% endcomment %}
                class="flex items-center gap-3 rounded-xl px-4 py-3 hover:bg-slate-100 dark:hover:bg-slate-800"
            >
                <i class="fa-solid fa-gear w-5"></i>
                <span>Settings</span>
            </a>

            <hr
                class="my-2 border-slate-200 dark:border-slate-700"
            >

            <a
                href="{% url 'logout' %}"
                class="flex items-center gap-3 rounded-xl px-4 py-3 text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20"
            >
                <i class="fa-solid fa-right-from-bracket w-5"></i>
                <span>Logout</span>
            </a>

        </nav>

    </div>

</div>
