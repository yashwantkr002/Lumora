{% load static %}

<header class="sticky top-0 z-50 border-b border-slate-200 bg-white/80 backdrop-blur-lg dark:border-slate-800 dark:bg-slate-900/80">
    <div class="mx-auto flex h-16 max-w-7xl items-center justify-between px-4 sm:px-6 lg:px-8">

        <a href="{% url 'post:feed' %}" class="flex items-center gap-3">
            <img src="{% static 'images/logo.svg' %}" alt="Lumora" class="h-10 w-10">
            <span class="text-2xl font-bold text-primary">Lumora</span>
        </a>

        <div class="hidden w-full max-w-md lg:block">
            <form action="{% url 'search' %}" method="get">
                <div class="relative">
                    <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                    <input type="text" name="q" placeholder="Search..." class="w-full rounded-xl border border-slate-300 bg-slate-100 py-2 pl-11 pr-4 outline-none focus:border-primary dark:border-slate-700 dark:bg-slate-800">
                </div>
            </form>
        </div>

        <div class="flex items-center gap-3">
            <a href="{% url 'post:feed' %}" class="rounded-xl p-2 hover:bg-slate-100 dark:hover:bg-slate-800" title="Home">
                <i class="fa-solid fa-house text-xl"></i>
            </a>

            <a href="{% url 'post:reels' %}" class="rounded-xl p-2 hover:bg-slate-100 dark:hover:bg-slate-800" title="Reels">
                <i class="fa-solid fa-film text-xl"></i>
            </a>

            <button id="themeToggle" class="rounded-xl p-2 hover:bg-slate-100 dark:hover:bg-slate-800" title="Toggle Theme">
                <i class="fa-solid fa-moon"></i>
            </button>

            {% if request.user.is_authenticated %}
                <a href="{% url 'notification:list' %}" class="relative rounded-xl p-2 hover:bg-slate-100 dark:hover:bg-slate-800" title="Notifications">
                    <i class="fa-solid fa-bell text-xl"></i>
                    <span class="absolute right-1 top-1 h-2.5 w-2.5 rounded-full bg-red-500"></span>
                </a>

                <a href="{% url 'conversations' %}" class="rounded-xl p-2 hover:bg-slate-100 dark:hover:bg-slate-800" title="Messages">
                    <i class="fa-solid fa-comments text-xl"></i>
                </a>

                <a href="{% url 'profile' request.user.username %}" class="flex items-center">
                    {% if request.user.profile.avatar %}
                        <img src="{{ request.user.profile.avatar.url }}" alt="Avatar" class="h-10 w-10 rounded-full border object-cover">
                    {% else %}
                        <img src="{% static 'images/default-avatar.svg' %}" alt="Avatar" class="h-10 w-10 rounded-full border object-cover">
                    {% endif %}
                </a>
            {% else %}
                <div class="flex items-center gap-2 ml-2">
                    <a href="{% url 'login' %}" class="rounded-xl px-4 py-2 text-sm font-medium text-slate-700 hover:bg-slate-100 dark:text-slate-300 dark:hover:bg-slate-800">
                        Log In
                    </a>
                    <a href="{% url 'register' %}" class="rounded-xl bg-primary px-4 py-2 text-sm font-medium text-white hover:bg-primary/95">
                        Sign Up
                    </a>
                </div>
            {% endif %}

        </div>
    </div>
</header>
