<button
    id="theme-toggle"
    type="button"
    class="fixed bottom-20 right-6 z-50 flex h-12 w-12 items-center justify-center rounded-full bg-primary text-white shadow-lg transition-all duration-300 hover:scale-110 hover:shadow-xl"
    aria-label="Toggle Theme"
>

    <i
        id="theme-icon"
        class="fa-solid fa-moon text-lg"
    ></i>

</button>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        try {
            const html = document.documentElement;
            const themeToggle = document.getElementById('theme-toggle');
            const themeIcon = document.getElementById('theme-icon');

            if (!themeToggle || !themeIcon) {
                console.warn('Theme toggle elements not found');
                return;
            }

            function updateThemeIcon() {
                if (html.classList.contains('dark')) {
                    themeIcon.className = 'fa-solid fa-sun text-lg';
                } else {
                    themeIcon.className = 'fa-solid fa-moon text-lg';
                }
            }

            // Initialize from localStorage
            if (localStorage.getItem('theme') === 'dark') {
                html.classList.add('dark');
            }

            updateThemeIcon();

            themeToggle.addEventListener('click', () => {
                html.classList.toggle('dark');
                const isDark = html.classList.contains('dark');
                localStorage.setItem('theme', isDark ? 'dark' : 'light');
                updateThemeIcon();
                console.debug('Theme toggled:', isDark ? 'dark' : 'light');
            });
        } catch (err) {
            console.error('Theme toggle error', err);
        }
    });
</script>
