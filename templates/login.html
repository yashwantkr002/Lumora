{% extends "base.html" %}
{% block start %}
<div class="min-h-screen flex items-center justify-center">
  <div class="max-w-md w-full bg-white shadow-md rounded-lg p-6">
    <h2 class="text-2xl font-bold text-center text-gray-800">
      Log in to Your Account
    </h2>
    
    <!-- Display Error Messages -->
    {% if messages %}
    <div class="mt-4">
      {% for message in messages %}
      <div
        id="message"
        class="text-sm mt-2 {% if message.tags == 'success' %}text-green-600{% elif message.tags == 'error' %}text-red-600{% else %}text-gray-600{% endif %}"
      >
        {{ message }}
      </div>
      {% endfor %}
    </div>
    {% endif %}
    
    <!-- Login Form -->
    <form method="post" class="mt-6">
      {% csrf_token %}
      <div class="space-y-4">
        <div>
          <label for="username" class="block text-sm font-medium text-gray-700">
            Username or Email
          </label>
          <input
            type="text"
            name="username"
            id="username"
            required
            class="mt-1 block w-full border-gray-300 rounded-lg shadow-sm focus:ring-blue-500 focus:border-blue-500"
          />
        </div>
        <div>
          <label for="password" class="block text-sm font-medium text-gray-700">
            Password
          </label>
        <div class="relative">
          <input
          type="password"
          name="password"
          id="password"
          required
          class="mt-1 block w-full border-gray-300 rounded-lg shadow-sm focus:ring-blue-500 focus:border-blue-500"
          />
          <img
              src="/static/images/openeye.png"
              alt="Toggle Password Visibility"
              class="absolute top-1/2 right-3 transform -translate-y-1/2 cursor-pointer"
              onclick="togglePasswordVisibility('password', this)"
            />
        </div>
        </div>
      </div>
      <button
        type="submit"
        class="w-full mt-4 bg-blue-500 text-white py-2 px-4 rounded-lg hover:bg-blue-600"
      >
        Log in
      </button>
    </form>
    
    <!-- Social Media Login -->
    <div class="mt-6">
      <p class="text-center text-gray-600">Or log in with</p>
      <div class="flex justify-center space-x-4 mt-4">
        <a
          href="{% url 'index' %}"
          class="flex items-center justify-center bg-red-500 text-white py-2 px-4 rounded-lg hover:bg-red-600"
        >
          <img
            src="/static/images/icons8-google.svg"
            alt="Google"
            class="h-5 w-5 mr-2"
          />
          Google
        </a>
        <a
          href="{% url 'index' %}"
          class="flex items-center justify-center bg-blue-700 text-white py-2 px-4 rounded-lg hover:bg-blue-800"
        >
          <img
            src="/static/images/icons8-facebook-logo.svg"
            alt="Facebook"
            class="h-5 w-5 mr-2"
          />
          Facebook
        </a>
        <a
          href="{% url 'index' %}"
          class="flex items-center justify-center bg-gray-800 text-white py-2 px-4 rounded-lg hover:bg-gray-900"
        >
          <img
            src="/static/images/icons8-github.svg"
            alt="GitHub"
            class="h-5 w-5 mr-2"
          />
          GitHub
        </a>
      </div>
    </div>
    
    <!-- Links -->
    <div class="mt-6 text-center">
      <p class="text-gray-600">
        Forgot your password?
        <a href="{% url 'reset' %}" class="text-blue-500 hover:underline">
          Reset it here
        </a>
      </p>
      <p class="mt-4 text-gray-600">
        Don't have an account?
        <a href="{% url 'register' %}" class="text-blue-500 hover:underline">
          Sign up
        </a>
      </p>
    </div>
  </div>
</div>
<script src="/static/js/login.js"></script>
{% endblock %}
