{% extends "base.html" %}

{% load static %}

{% block title %}
Change Password | Lumora
{% endblock %}

{% block content %}

<div class="flex min-h-[80vh] items-center justify-center py-10">

    <div
        class="w-full max-w-md rounded-3xl border border-slate-200 bg-white p-8 shadow-xl dark:border-slate-800 dark:bg-slate-900"
    >

        <!-- Logo -->

        <div class="mb-8 text-center">

            <img
                src="{% static 'images/logo.svg' %}"
                alt="Lumora"
                class="mx-auto mb-4 h-16 w-16"
            >

            <h1
                class="text-3xl font-bold"
            >

                Change Password

            </h1>

            <p
                class="mt-2 text-slate-500"
            >

                Update your account password.

            </p>

        </div>

        <form
            method="post"
            novalidate
            class="space-y-5"
        >

            {% csrf_token %}

            <div>

                <label class="mb-2 block font-medium">

                    Current Password

                </label>

                {{ form.old_password }}

            </div>

            <div>

                <label class="mb-2 block font-medium">

                    New Password

                </label>

                {{ form.new_password1 }}

            </div>

            <div>

                <label class="mb-2 block font-medium">

                    Confirm New Password

                </label>

                {{ form.new_password2 }}

            </div>

            <button
                type="submit"
                class="w-full rounded-xl bg-primary py-3 font-semibold text-white transition hover:opacity-90"
            >

                Update Password

            </button>

        </form>

        <div
            class="mt-8 text-center"
        >

            <a
                href="{% url 'profile' request.user.username %}"
                class="font-medium text-primary hover:underline"
            >

                ← Back to Profile

            </a>

        </div>

    </div>

</div>

{% endblock %}
