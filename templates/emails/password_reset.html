
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <title>Reset Your Password</title>

</head>

<body
    style="
        margin:0;
        padding:40px;
        background:#f8fafc;
        font-family:Arial,sans-serif;
    "
>

    <table
        width="100%"
        cellpadding="0"
        cellspacing="0"
    >
        <tr>
            <td align="center">

                <table
                    width="600"
                    cellpadding="0"
                    cellspacing="0"
                    style="
                        background:#ffffff;
                        border-radius:12px;
                        padding:40px;
                    "
                >

                    <tr>
                        <td>

                            <h2>
                                Hello {{ user.first_name|default:user.username }},
                            </h2>

                            <p>
                                We received a request to reset your Lumora password.
                            </p>

                            <p style="text-align:center;">


                                <a
                                    href="{{ reset_url }}"
                                    style="
                                        background:#2563eb;
                                        color:#ffffff;
                                        padding:14px 28px;
                                        border-radius:8px;
                                        text-decoration:none;
                                        display:inline-block;
                                        font-weight:bold;
                                    "
                                >
                                    Reset Password
                                </a>

                            </p>


                            <p>
                                If the button doesn't work, use this link:
                            </p>

                            <p>
                                <a href="{{ reset_url }}">
                                    {{ reset_url }}
                                </a>
                            </p>


                            <p>
                                If you didn't request this password reset,
                                you can safely ignore this email.
                            </p>

                            <hr>

                            <p
                                style="
                                    color:#64748b;
                                    font-size:13px;
                                "
                            >
                                © 2026 Lumora. All rights reserved.
                            </p>

                        </td>
                    </tr>

                </table>

            </td>
        </tr>

    </table>

</body>

</html>
