{% extends "base.html" %}
{% block start %}
<div class="min-h-screen flex items-center justify-center bg-gray-100">
  <div class="max-w-md w-full bg-white shadow-md rounded-lg p-6">
    <!-- Header -->
    <h2 class="text-2xl font-bold text-center text-gray-800">Password Reset Email Sent</h2>
    <p class="text-gray-600 mt-2 text-center">
      If an account with the provided email exists, a password reset link has been sent.
    </p>

    <!-- Success Message -->
    <div class="mt-4 text-center">
      <p class="text-green-600 font-medium">
        Please check your <span class="font-semibold text-blue-500">{{ email }}</span> email for further instructions.
      </p>
    </div>

    <!-- Back to Login Button -->
    <div class="mt-6 text-center">
      <a
        href="{% url 'login' %}"
        class="w-full bg-blue-500 text-white py-2 px-4 rounded-lg hover:bg-blue-600 inline-block"
      >
        Back to Login
      </a>
    </div>

    <!-- Footer Note -->
    <div class="mt-6 text-center text-sm text-gray-500">
      Didn't receive the email? <a href="{% url 'reset' %}" class="text-blue-500 hover:underline">Try again</a>.
    </div>
  </div>
</div>
{% endblock %}
