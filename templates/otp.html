{% extends "base.html" %}
{% block start %}
<div class="min-h-screen flex items-center justify-center">
  <div class="max-w-md w-full bg-white shadow-md rounded-lg p-6">
    <h2 class="text-2xl font-bold text-center text-gray-800">
      Verify Your Email
    </h2>
    
    <!-- Display Email Address -->
    <p class="mt-4 text-center text-gray-600">
      An OTP has been sent to your email address:
      <span class="font-semibold text-gray-800">{{ email }}</span>
    </p>
    
    <!-- Display Error Messages -->
    {% if messages %}
    <div class="mt-4">
      {% for message in messages %}
      <div
        id="message"
        class="text-sm mt-2 {% if message.tags == 'success' %}text-green-600{% elif message.tags == 'error' %}text-red-600{% else %}text-gray-600{% endif %}"
      >
        {{ message }}
      </div>
      {% endfor %}
    </div>
    {% endif %}
    
    <!-- OTP Form -->
    <form method="post" class="mt-6">
      {% csrf_token %}
      <div class="space-y-4">
        <div>
          <label for="otp" class="block text-sm font-medium text-gray-700">
            Enter OTP
          </label>
          <input
            type="text"
            name="otp"
            id="otp"
            required
            maxlength="6"
            class="mt-1 block w-full border-gray-300 rounded-lg shadow-sm focus:ring-blue-500 focus:border-blue-500"
          />
        </div>
      </div>
      <button
        type="submit"
        class="w-full mt-4 bg-blue-500 text-white py-2 px-4 rounded-lg hover:bg-blue-600"
      >
        Verify OTP
      </button>
    </form>
    
    <!-- Resend OTP -->
    <div class="mt-6 text-center">
      <p class="text-gray-600">
        Didn't receive the OTP? 
        <span id="resend_otp">

        </span>
      </p>
    </div>
  </div>
</div>
<script src="/static/js/otp.js"></script>
{% endblock %}
